<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#ffffff">
<title>RESUITE</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  :root{
    --bg:#ffffff;--ink:#15202b;--muted:#8b95a3;--faint:#b9c0cb;
    --line:#eef0f4;--line2:#e3e7ee;--chip:#f5f7fa;
    --go:#1f9d63;--go-d:#157a4c;--stop:#d24b3c;--accent:#16213a;--amber:#c98a16;
  }
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    font-weight:400;-webkit-font-smoothing:antialiased;
    max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

  /* top bar */
  .bar{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 6px}
  .bar .mark{font-size:12px;letter-spacing:3px;color:var(--muted);font-weight:600}
  .bar .tools{display:flex;gap:4px}
  .ico{width:40px;height:40px;border-radius:50%;border:none;background:none;color:var(--muted);
    display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s;position:relative}
  .ico:active{background:var(--chip)}
  .ico svg{width:20px;height:20px;stroke:currentColor;stroke-width:1.6;fill:none;
    stroke-linecap:round;stroke-linejoin:round}
  .syncdot{width:7px;height:7px;border-radius:50%;background:var(--faint);position:absolute;top:8px;right:8px}
  .syncdot.ok{background:var(--go)} .syncdot.pend{background:var(--amber)}

  /* ---- main dashboard ---- */
  .stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:8px 24px 28px;text-align:center}
  .client-chip{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:30px;
    background:var(--chip);color:var(--ink);font-size:14px;font-weight:500;cursor:pointer;margin-bottom:34px}
  .client-chip .dotnum{color:var(--muted);font-weight:400}
  .client-chip svg{width:14px;height:14px;stroke:var(--faint);stroke-width:1.8;fill:none}

  .timer{font-variant-numeric:tabular-nums;font-size:62px;font-weight:300;letter-spacing:1px;line-height:1}
  .timer .ss{color:var(--faint)}
  .ptsline{margin-top:14px;font-size:14px;color:var(--muted)}
  .ptsline b{color:var(--go-d);font-weight:600}
  .state-lbl{margin-top:6px;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--faint)}

  /* control cluster: icon · main · icon */
  .controls{display:flex;align-items:center;justify-content:center;gap:30px;margin-top:42px}
  .side{width:58px;height:58px;border-radius:50%;border:1px solid var(--line2);background:var(--bg);
    color:var(--ink);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s}
  .side:active{background:var(--chip)}
  .side svg{width:24px;height:24px;stroke:currentColor;stroke-width:1.6;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .side.stop{color:var(--stop);border-color:#f3d4cf}
  .side[disabled]{opacity:.32;cursor:default}
  .primary{width:92px;height:92px;border-radius:50%;border:none;background:var(--go);color:#fff;
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    box-shadow:0 10px 26px rgba(31,157,99,.32);transition:transform .12s,background .2s}
  .primary:active{transform:scale(.96)}
  .primary.running{background:var(--accent);box-shadow:0 10px 26px rgba(22,33,58,.28)}
  .primary svg{width:40px;height:40px;fill:#fff;stroke:none}

  .quiet{margin-top:30px;font-size:13px;color:var(--muted);display:flex;gap:22px}
  .quiet button{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;
    display:inline-flex;align-items:center;gap:6px;font-weight:500}
  .quiet svg{width:15px;height:15px;stroke:currentColor;stroke-width:1.6;fill:none;stroke-linecap:round;stroke-linejoin:round}

  /* ---- intake (customer journey) ---- */
  .intake{flex:1;display:flex;flex-direction:column;padding:18px 26px 30px}
  .intake .step{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--faint)}
  .intake h1{font-size:26px;font-weight:600;margin:10px 0 6px;letter-spacing:-.3px}
  .intake .lede{font-size:14px;color:var(--muted);line-height:1.5;margin-bottom:30px}
  .ifield{margin-bottom:22px}
  .ifield label{display:block;font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:500;letter-spacing:.3px}
  .ifield .inwrap{display:flex;align-items:center;gap:10px;border-bottom:1.5px solid var(--line2);padding:6px 2px}
  .ifield .inwrap:focus-within{border-color:var(--accent)}
  .ifield .inwrap svg{width:18px;height:18px;stroke:var(--faint);stroke-width:1.6;fill:none;flex:0 0 auto}
  .ifield input{flex:1;border:none;outline:none;font-size:22px;font-weight:500;color:var(--ink);background:none;letter-spacing:1px}
  .ifield .reroll{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px}
  .ifield .reroll svg{width:18px;height:18px}
  .ihint{font-size:12px;color:var(--faint);margin-top:8px;line-height:1.5}

  .recent{margin-top:6px}
  .recent .rh{font-size:12px;color:var(--muted);margin-bottom:8px;letter-spacing:.3px}
  .rrow{display:flex;align-items:center;justify-content:space-between;padding:13px 2px;border-bottom:1px solid var(--line);cursor:pointer}
  .rrow .rn{font-size:15px;font-weight:500}
  .rrow .rt{font-size:13px;color:var(--muted)}
  .rrow svg{width:16px;height:16px;stroke:var(--faint);stroke-width:1.7;fill:none}

  .cta{margin-top:auto;padding-top:22px}
  .cta button{width:100%;padding:16px;border:none;border-radius:14px;background:var(--accent);color:#fff;
    font-size:16px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px}
  .cta button svg{width:20px;height:20px;fill:#fff}
  .cta .ghost{background:none;color:var(--muted);font-weight:500;margin-top:6px;padding:12px}

  /* ---- bottom sheet ---- */
  .scrim{position:fixed;inset:0;background:rgba(20,28,45,.42);display:none;align-items:flex-end;justify-content:center;z-index:50}
  .scrim.show{display:flex}
  .sheet{background:#fff;width:100%;max-width:480px;border-radius:22px 22px 0 0;
    padding:8px 22px calc(24px + env(safe-area-inset-bottom));max-height:88vh;overflow:auto}
  .grab{width:38px;height:4px;border-radius:3px;background:var(--line2);margin:8px auto 14px}
  .sheet h3{font-size:18px;font-weight:600;margin-bottom:4px}
  .sheet .sub{font-size:13px;color:var(--muted);margin-bottom:18px;line-height:1.5}
  .seg{display:flex;background:var(--chip);border-radius:12px;padding:4px;margin-bottom:18px}
  .seg button{flex:1;border:none;background:none;padding:10px;font-size:13px;font-weight:600;color:var(--muted);border-radius:9px;cursor:pointer}
  .seg button.on{background:#fff;color:var(--accent);box-shadow:0 1px 3px rgba(0,0,0,.10)}
  .mode{display:none}.mode.on{display:block}
  .frow{display:flex;gap:12px}
  .fld{flex:1;margin-bottom:16px}
  .fld label{display:block;font-size:12px;color:var(--muted);margin-bottom:7px;font-weight:500}
  .fld input{width:100%;padding:12px;border:1px solid var(--line2);border-radius:11px;font-size:16px;outline:none}
  .fld input:focus{border-color:var(--accent)}
  .pvbar{background:var(--chip);border-radius:12px;padding:14px;text-align:center;margin-bottom:16px}
  .pvbar .c{font-size:13px;color:var(--muted)} .pvbar .p{font-size:24px;font-weight:600;color:var(--go-d);margin-top:2px}
  .sbtn{width:100%;padding:15px;border:none;border-radius:13px;background:var(--go);color:#fff;font-size:16px;font-weight:600;cursor:pointer}
  .sbtn.dark{background:var(--accent)}
  .sbtn.soft{background:var(--chip);color:var(--ink)}

  .erow{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--line);font-size:14px}
  .erow:last-child{border-bottom:none}
  .erow .ed{color:var(--muted);font-size:13px}
  .erow .er{display:flex;align-items:center;gap:12px}
  .erow .eb{font-weight:600}
  .erow .dot{font-size:9px}.erow .dot.sent{color:var(--go)}.erow .dot.pend{color:var(--amber)}
  .erow .x{color:var(--faint);cursor:pointer;font-size:18px;line-height:1}
  .empty{text-align:center;color:var(--faint);padding:34px 10px;font-size:14px;line-height:1.6}

  .toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);
    background:var(--accent);color:#fff;font-size:13px;padding:11px 18px;border-radius:30px;opacity:0;
    transition:.25s;z-index:90;pointer-events:none;max-width:90%}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .cmodal{position:fixed;inset:0;background:rgba(20,28,45,.5);display:none;align-items:center;justify-content:center;z-index:60;padding:26px}
  .cmodal.show{display:flex}
  .cbox{background:#fff;border-radius:20px;padding:26px 22px;max-width:340px;width:100%;text-align:center}
  .ceye{width:54px;height:54px;border-radius:50%;background:var(--chip);display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
  .ceye svg{width:26px;height:26px;stroke:var(--accent);stroke-width:1.6;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .ctitle{font-size:20px;font-weight:600}
  .csub{font-size:14px;color:var(--muted);margin-top:6px;line-height:1.5}

  .chips{display:flex;flex-wrap:wrap;gap:8px;margin:4px 0 8px}
  .chip{border:1px solid var(--line2);border-radius:30px;padding:10px 14px;font-size:14px;font-weight:500;background:#fff;cursor:pointer;display:inline-flex;align-items:center;gap:7px}
  .chip.done{background:#eef7f1;border-color:#cfe9da;color:var(--go-d)}
  .chip svg{width:15px;height:15px;stroke:currentColor;stroke-width:1.8;fill:none}

  /* calendar */
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .cal-nav{background:var(--chip);border:none;width:38px;height:38px;border-radius:10px;font-size:18px;cursor:pointer;color:var(--ink)}
  .cal-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px}
  .cal-dow span{text-align:center;font-size:10px;color:var(--faint);font-weight:600}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .cell{aspect-ratio:1;border-radius:10px;background:#fafbfc;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;cursor:pointer;border:1px solid transparent}
  .cell.empty{background:transparent;cursor:default}
  .cell.has{background:var(--chip)} .cell.today{border-color:var(--accent);font-weight:600} .cell.sel{background:var(--accent);color:#fff}
  .cell .ch{font-size:9px;color:var(--go-d);font-weight:600;margin-top:1px}.cell.sel .ch{color:#fff}
</style>
</head>
<body>

<div class="bar">
  <button class="ico" id="settingsBtn" title="Spreadsheet connection">
    <span class="syncdot" id="syncDot"></span>
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </button>
  <div class="mark">RESUITE</div>
  <div class="tools">
    <button class="ico" id="calBtn" title="Calendar"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></button>
    <button class="ico" id="listBtn" title="Entries"><svg viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg></button>
  </div>
</div>

<div id="root"></div>

<!-- bottom sheet host -->
<div class="scrim" id="scrim"><div class="sheet" id="sheet"></div></div>
<div class="cmodal" id="chkScrim"><div class="cbox">
  <div class="ceye"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></div>
  <div class="ctitle" id="chkTitle">Are you still there?</div>
  <div class="csub" id="chkSub"></div>
  <div class="csub" id="chkCount" style="margin-top:8px;font-variant-numeric:tabular-nums;color:var(--stop)"></div>
  <button class="sbtn" id="chkGo" style="margin-top:18px">Yes, keep going</button>
  <button class="sbtn soft" id="chkStop" style="margin-top:10px">Pause timer</button>
</div></div>
<div class="toast" id="toast"></div>

<script>
/* ===== Billing core (UNCHANGED): minutes -> tenths, rounded UP per 6-min unit ===== */
function minutesToTenths(min){ return min<=0?0:Math.ceil(min/6)/10; }

/* ===== State ===== */
var STORE_KEY="resuite_v2";
var state=load();
function defaultSteps(){return[{id:1,label:"Logged today's hours"},{id:2,label:"Sent what was promised"},{id:3,label:"Booked next meeting"}];}
function load(){
  try{var r=localStorage.getItem(STORE_KEY);if(r){var s=JSON.parse(r);
    if(!s.steps)s.steps=defaultSteps();
    if(!s.checkpoints)s.checkpoints=["09:00","13:00","17:00"];
    if(!s.done)s.done={};if(!s.fired)s.fired={};
    if(!s.checkin)s.checkin={on:true,intervalMin:30};
    if(typeof s.checkin.intervalMin!=="number")s.checkin.intervalMin=30;
    if(!s.log)s.log=[];
    if(!s.timer)s.timer={clientId:null,running:false,startedAt:null,accMs:0};
    if(typeof s.activeId==="undefined")s.activeId=null;
    if(!s.billing)s.billing={customerId:null,email:"",status:"none",active:false};
    return s;}}catch(e){}
  return{clients:[],nextAppt:"",webhook:"",steps:defaultSteps(),checkpoints:["09:00","13:00","17:00"],
    done:{},fired:{},remindersOn:false,checkin:{on:true,intervalMin:30},log:[],
    timer:{clientId:null,running:false,startedAt:null,accMs:0},activeId:null,
    billing:{customerId:null,email:"",status:"none",active:false}};
}
function save(){try{localStorage.setItem(STORE_KEY,JSON.stringify(state));}catch(e){}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function randNum(){var n;do{n=String(Math.floor(100000+Math.random()*900000));}while(state.clients.some(function(c){return c.number===n;}));return n;}

/* ===== Helpers ===== */
function getClient(id){return state.clients.find(function(c){return c.id===id;});}
function activeClient(){return getClient(state.activeId);}
function clientHours(c){return c.entries.reduce(function(s,e){return s+e.tenths;},0);}
function pendingCount(){var n=0;state.clients.forEach(function(c){c.entries.forEach(function(e){if(!e.sent)n++;});});return n;}
function pad(x){return(x<10?"0":"")+x;}
function todayKey(){var d=new Date();return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();}
function isoToday(){var d=new Date();return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function hhmmNow(){var d=new Date();return pad(d.getHours())+":"+pad(d.getMinutes());}
function hmDur(min){min=Math.round(min);return(min>=60?Math.floor(min/60)+"h ":"")+(min%60)+"m";}
/* Follow-up hand-offs — coded only, no names/content ever sent */
var FOLLOWCATS=[{k:"followup",label:"Follow up",code:5},{k:"email",label:"Email",code:2},{k:"documents",label:"Documents",code:1},{k:"signatures",label:"Signatures",code:3},{k:"admin",label:"Admin",code:4}];
function postAction(obj){
  state.log.push({at:Date.now(),obj:obj,sent:!state.webhook?false:false});
  if(state.webhook){postJSON(obj).then(function(){var l=state.log[state.log.length-1];if(l)l.sent=true;save();}).catch(function(){});}
  save();
}
function escapeHtml(s){return(s||"").replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];});}
function toast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove("show");},1800);}

/* ===== Entry + one-way send (payload + transport UNCHANGED) ===== */
function addEntry(c,minutes,start,end,source){
  var e={id:uid(),at:Date.now(),minutes:minutes,tenths:minutesToTenths(minutes),start:start||"",end:end||"",source:source||"",sent:false};
  c.entries.push(e);trySend(c,e);return e;
}
function postJSON(obj){return fetch(state.webhook,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=UTF-8"},body:JSON.stringify(obj)});}
function payload(c,e){return{type:"time",clientNumber:c.number,date:new Date(e.at).toISOString().slice(0,10),start:e.start||"",stop:e.end||"",minutes:Math.round(e.minutes),points:e.tenths};}
function trySend(c,e){
  if(!state.webhook){save();return;}
  postJSON(payload(c,e)).then(function(){e.sent=true;save();renderSync();}).catch(function(){e.sent=false;save();renderSync();});
}
function sendAll(){if(!state.webhook){openSettings();return;}state.clients.forEach(function(c){c.entries.forEach(function(e){if(!e.sent)trySend(c,e);});});toast("Sending pending…");}

/* ===== Timer ===== */
function elapsedMs(){var t=state.timer;return t.accMs+(t.running&&t.startedAt?Date.now()-t.startedAt:0);}
function fmtTimer(ms){var s=Math.floor(ms/1000);return pad(Math.floor(s/3600))+":"+pad(Math.floor(s/60)%60)+'<span class="ss">:'+pad(s%60)+"</span>";}
function startOrResume(){
  var c=activeClient();if(!c)return goIntake();
  var t=state.timer;
  if(t.running)return;
  if(t.clientId!==c.id){t.clientId=c.id;t.accMs=0;}
  t.running=true;t.startedAt=Date.now();save();renderMain();
}
function pauseTimer(){var t=state.timer;if(!t.running)return;t.accMs+=Date.now()-t.startedAt;t.running=false;t.startedAt=null;save();renderMain();}
function togglePlay(){state.timer.running?pauseTimer():startOrResume();}
function stopTimer(saveEntry){
  var t=state.timer,total=elapsedMs();
  if(saveEntry&&t.clientId){var c=getClient(t.clientId);var mins=Math.round(total/60000);if(c&&mins>0){addEntry(c,mins,"","","timer");toast("Saved "+minutesToTenths(mins).toFixed(1)+" pts to #"+c.number);}}
  state.timer={clientId:null,running:false,startedAt:null,accMs:0};save();renderMain();
}

/* ===== Views ===== */
var root=document.getElementById("root");
function render(){ if(!activeClient()){goIntake();} else {renderMain();} renderSync(); }
function goIntake(){ state.view="intake"; root.innerHTML=intakeHTML(); wireIntake(); }
function renderMain(){
  state.view="main";
  var c=activeClient(); if(!c)return goIntake();
  var t=state.timer, running=t.running, hasTime=t.clientId===c.id&&(t.running||t.accMs>0);
  var lbl=running?"Recording":(hasTime?"Paused":"Ready");
  root.innerHTML=
  '<div class="stage">'+
    '<div class="client-chip" id="chipSwitch">Client #<b>'+escapeHtml(c.number)+'</b>'+
      '<span class="dotnum">· '+clientHours(c).toFixed(1)+' pts today</span>'+
      '<svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg></div>'+
    '<div class="timer" id="timerDisp">'+fmtTimer(t.clientId===c.id?elapsedMs():0)+'</div>'+
    '<div class="ptsline">Billable now · <b id="ptsNow">'+minutesToTenths(Math.ceil((t.clientId===c.id?elapsedMs():0)/60000)).toFixed(1)+'</b> pts</div>'+
    '<div class="state-lbl" id="stateLbl">'+lbl+'</div>'+
    '<div class="controls">'+
      '<button class="side" id="btnSwitch" title="Switch client"><svg viewBox="0 0 24 24"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg></button>'+
      '<button class="primary'+(running?" running":"")+'" id="btnPlay" title="Start / pause">'+
        (running?'<svg viewBox="0 0 24 24"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>'
                :'<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>')+'</button>'+

function startTick(){
  clearInterval(tickH);

    if(state.view!=="main")return;

    var pn=document.getElementById("ptsNow");if(pn)pn.textContent=minutesToTenths(Math.ceil(ms/60000)).toFixed(1);
    if(t.running&&state.checkin&&state.checkin.on){
      var iv=state.checkin.intervalMin||30,idx=Math.floor((ms/60000)/iv);

  openSheet('<h3>Calendar</h3><div class="cal-head"><button class="cal-nav" id="cPrev">‹</button><div style="font-weight:600">'+calView.toLocaleDateString(undefined,{month:"long",year:"numeric"})+'</div><button class="cal-nav" id="cNext">›</button></div>'+
    '<div class="cal-dow"><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span><span>S</span></div><div class="cal-grid">'+grid+'</div>'+detail);
  document.getElementById("cPrev").onclick=function(){calView.setMonth(calView.getMonth()-1);renderCal();};

/* ===== Check-in reminder ("Are you still working?") ===== */
var chkInt=null, CHK_GRACE=180000; // 3-minute grace, then auto-pause (Netflix style)
function stopCheckInTimer(){ if(chkInt){clearInterval(chkInt);chkInt=null;} }
function hideCheckIn(){ stopCheckInTimer(); document.getElementById("chkScrim").classList.remove("show"); }
function fireCheckIn(ms){
  var c=activeClient();
  document.getElementById("chkTitle").textContent="Are you still there?";
  document.getElementById("chkSub").innerHTML=(c?"Client #<b>"+escapeHtml(c.number)+"</b> · ":"")+hmDur(ms/60000)+" tracked so far.";
  var deadline=Date.now()+CHK_GRACE, cd=document.getElementById("chkCount");
  function tick(){
    var r=Math.max(0,deadline-Date.now()), s=Math.ceil(r/1000);
    cd.textContent="Auto-pausing in "+Math.floor(s/60)+":"+pad(s%60);
    if(r<=0){hideCheckIn();pauseTimer();toast("Paused — no response");}
  }
  tick(); stopCheckInTimer(); chkInt=setInterval(tick,1000);
  document.getElementById("chkScrim").classList.add("show");
}
document.getElementById("chkGo").onclick=function(){hideCheckIn();};
document.getElementById("chkStop").onclick=function(){hideCheckIn();pauseTimer();};

/* top-bar wiring */
document.getElementById("settingsBtn").onclick=openSettings;
document.getElementById("listBtn").onclick=openList;
document.getElementById("calBtn").onclick=openCal;

handleCheckoutReturn();
refreshSubscription();
render();
</script>
</body>
